<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- 柔和阴影效果，让边缘清晰但不生硬 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- 头部 -->
  <ellipse cx="50" cy="55" rx="38" ry="35" fill="white" filter="url(#softShadow)"/>
  <!-- 耳朵 - 稍微插入头部 -->
  <circle cx="20" cy="28" r="10" fill="white" filter="url(#softShadow)"/>
  <circle cx="80" cy="28" r="10" fill="white" filter="url(#softShadow)"/>
  <!-- 眼睛 -->
  <circle cx="32" cy="50" r="5" fill="#333"/>
  <circle cx="68" cy="50" r="5" fill="#333"/>
  <!-- 眼睛高光 -->
  <circle cx="34" cy="48" r="1.5" fill="white"/>
  <circle cx="70" cy="48" r="1.5" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="50" cy="58" rx="6" ry="4" fill="#333"/>
  <!-- 嘴巴 -->
  <path d="M44 66 Q50 72 56 66" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 脸颊 -->
  <circle cx="22" cy="58" r="4" fill="#FFE4E1" opacity="0.6"/>
  <circle cx="78" cy="58" r="4" fill="#FFE4E1" opacity="0.6"/>
</svg>
